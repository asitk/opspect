# Configuration

# Even if a plugin has no configuration, it must be declared in here
# to be active. Declaring a plugin means just specifying the name
# as a section with no variables. To deactivate a plugin, comment
# out the name and any variables.

# One rule that plugins conform to is wherever a connection string
# can be passed, the values '' and 'localhost' are treated specially.
# They indicate to the plugin to use their own builtin configuration to
# connect to the local system.

# NOTE: The configuration has a few required parameters. They are marked
# with 'required'. Be sure to edit those to make this configuration work.

# Tags can also be specified via a normal map, but only one form at a time:
[tags]
  # dc = "us-east-1"

# Configuration for the agent
[agent]
  # Default data collection interval for all plugins
  interval = "19s"   # (3 collections per min)
  #interval = "25s"  # (2 collections per min)

  # Rounds collection interval to 'interval'
  # ie, if interval="10s" then always collect on :00, :10, :20, etc.
  round_interval = true

  # Default data flushing interval for all outputs. You should not set this below
  # interval. Maximum flush_interval will be flush_interval + flush_jitter
  flush_interval = "60s"

  # Enable in order to flush points immediately after collection. flush interval
  # will still be honoured even if this is enabled. It will probably not have 
  # any points to flush when this is set
  aggressive_writes = "true"

  # Jitter the flush interval by a random amount. This is primarily to avoid
  # large write spikes for users running a large number of instances.
  # ie, a jitter of 5s and interval 10s means flushes will happen every 10-15s
  # This is currently not honored if aggressive_writes are set to true
  flush_jitter = "4s"

  # Run in debug mode
  debug = false

  # Override default hostname, if empty use os.Hostname()
  hostname = ""

###############################################################################
#                                  OUTPUTS                                    #
###############################################################################

[outputs]

  #[[outputs.file]]
  [[outputs.kafka]]
     brokers = ["localhost:9092"]
     topic = "log"
     #routing_key = "host"

###############################################################################
#                                  PLUGINS                                    #
###############################################################################

[plugins]

    # Read metrics about cpu usage
    [[plugins.cpu]]
      # Whether to report per-cpu stats or not
      #percpu = true
      # Whether to report total system cpu stats or not
      totalcpu = true
      # Comment this line if you want raw CPU time metrics
      # drop = ["cpu_time*"]

    [[plugins.system]]
    [[plugins.mem]]
    [[plugins.swap]]
    [[plugins.disk]]

    [[plugins.io]]
      devices = ["sda1"]

    [[plugins.net]]
      interfaces = ["eth0"]

    [[plugins.netstat]]
    [[plugins.memcached]]
    
    [[plugins.procstat]]
				# TypeWebServer   0
				# TypeAppServer   1
				# TypeQueue       2
				# TypeCache       3
				# TypeRDBMS       4
				# TypeBigTable    5
				# TypeKVStore     6
				# TypeDOCStore    7
				# TypeGraphStore  8

    [[plugins.procstat.specifications]]
        pattern="^.*((jetty\\.logs).*(start\\.jar))|((start\\.jar).*(jetty\\.logs)).*"
        category=0
        name="java"
      #[[plugins.procstat.specifications]]
